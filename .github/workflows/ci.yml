name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

env:
  GO_VERSION: "1.26.1"
  NODE_VERSION: "24"
  WAILS_VERSION: "v3.0.0-alpha2.117"

jobs:
  # ─────────────────────────────────────────────────────────────
  # Lint
  # ─────────────────────────────────────────────────────────────
  lint-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          args: --timeout=5m

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps
      - name: ESLint
        working-directory: frontend
        run: npm run lint
      - name: Prettier check
        working-directory: frontend
        run: npm run format:check
      - name: TypeScript check
        working-directory: frontend
        run: npm run typecheck

  # ─────────────────────────────────────────────────────────────
  # Test
  # ─────────────────────────────────────────────────────────────
  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run unit tests
        run: go test ./backend/... -v -count=1 -race -coverprofile=coverage.out -covermode=atomic
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: go-coverage
          path: coverage.out

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps
      - name: Run unit tests
        working-directory: frontend
        run: npm run test:coverage
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: frontend/coverage/

  test-integration:
    runs-on: ubuntu-latest
    needs: [test-go]
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testuser"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      mysql:
        image: mysql:9.0
        env:
          MYSQL_ROOT_PASSWORD: testrootpass
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
          MYSQL_DATABASE: testdb
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run integration tests
        env:
          TEST_POSTGRES_URL: "postgres://testuser:testpass@localhost:5432/testdb?sslmode=disable"
          TEST_MYSQL_URL: "testuser:testpass@tcp(localhost:3306)/testdb"
          TEST_REDIS_URL: "localhost:6379"
        run: go test -tags integration ./backend/... -v -count=1 -timeout=120s

  # ─────────────────────────────────────────────────────────────
  # Security
  # ─────────────────────────────────────────────────────────────
  security-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  security-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps
      - name: npm audit
        working-directory: frontend
        run: npm audit --audit-level=moderate

  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [go, javascript-typescript]
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
