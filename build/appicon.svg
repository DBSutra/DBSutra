<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00d2ff"/>
      <stop offset="100%" stop-color="#3a7bd5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Database cylinder -->
  <ellipse cx="256" cy="180" rx="120" ry="36" fill="none" stroke="url(#accent)" stroke-width="6" opacity="0.9"/>
  <path d="M136 180 L136 280 Q136 316 256 316 Q376 316 376 280 L376 180" fill="none" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M136 230 Q136 266 256 266 Q376 266 376 230" fill="none" stroke="url(#accent)" stroke-width="4" opacity="0.5"/>

  <!-- Query cursor / terminal prompt -->
  <rect x="180" y="340" width="8" height="24" rx="4" fill="#00d2ff" opacity="0.9"/>
  <rect x="200" y="348" width="60" height="8" rx="4" fill="#00d2ff" opacity="0.6"/>
  <rect x="200" y="364" width="40" height="8" rx="4" fill="#00d2ff" opacity="0.4"/>

  <!-- Accent dots -->
  <circle cx="340" cy="356" r="6" fill="#00d2ff" opacity="0.3"/>
  <circle cx="360" cy="356" r="6" fill="#3a7bd5" opacity="0.3"/>
  <circle cx="380" cy="356" r="6" fill="#00d2ff" opacity="0.2"/>
</svg>
